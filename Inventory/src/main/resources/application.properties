spring.application.name=Inventory
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/api_shop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Babufuggu#@5}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,text/html,text/css,application/javascript
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:1}
spring.datasource.hikari.keepalive-time=300000

# Catalog data is already stored in the database. Re-seeding thousands of rows
# on every free-tier cold start makes the application noticeably slower.
accessory.catalog.seed.enabled=${ACCESSORY_CATALOG_SEED_ENABLED:false}

# Set DATABASE_STORAGE_LIMIT_MB in hosting only when the database provider's
# actual quota is known. Zero keeps the UI honest and shows usage without
# inventing a remaining-space figure.
database.storage.limit.mb=${DATABASE_STORAGE_LIMIT_MB:0}

# Paper-only learning mode. It can open tiny virtual practice positions when
# real market engines agree but optional AI providers are unavailable.
CRYPTO_PRACTICE_SCOUT_ENABLED=${CRYPTO_PRACTICE_SCOUT_ENABLED:true}
