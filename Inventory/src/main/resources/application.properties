spring.application.name=Inventory
spring.config.import=optional:file:.env[.properties]
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/api_shop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Babufuggu#@5}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.main.lazy-initialization=${SPRING_MAIN_LAZY_INITIALIZATION:true}
spring.jmx.enabled=false

server.port=${PORT:8080}
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=application/json,text/html,text/css,application/javascript
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:1}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.keepalive-time=300000
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:10}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN_SPARE:1}
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=2
spring.task.scheduling.pool.size=1

# Set DATABASE_STORAGE_LIMIT_MB in hosting only when the database provider's
# actual quota is known. Zero keeps the UI honest and shows usage without
# inventing a remaining-space figure.
database.storage.limit.mb=${DATABASE_STORAGE_LIMIT_MB:0}
